name: Release

# Dispara ao criar uma tag (ex.: v1.0.0). Empacota o addon e publica no
# GitHub Releases, CurseForge e Wago via BigWigsMods/packager.
on:
  push:
    tags:
      - "**"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Package and release
        uses: BigWigsMods/packager@v2
        env:
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}   # fornecido automaticamente
          CF_API_KEY: ${{ secrets.CF_API_KEY }}        # segredo: token da CurseForge
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }} # segredo: token do Wago
